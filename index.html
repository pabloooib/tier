<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ============================================================
   TOKENS DE DISEÑO — paleta mate/pastel de bajo estímulo
   ============================================================ */
:root {
  --color-cielo:       #5b7fa6;
  --color-terracota:   #d98c7a;
  --color-sauce:       #7fae8e;
  --color-mostaza:     #e8c468;
  --color-crema:       #faf6ef;
  --color-crema-suave: #f1ece1;
  --color-texto:       #3a3a3a;
  --color-texto-suave: #6b6b6b;
  --color-borde:       #e3dcc9;
  --color-vidrio:      rgba(250, 246, 239, 0.72);

  --fuente-display: "Baloo 2", "Trebuchet MS", system-ui, sans-serif;
  --fuente-cuerpo:  "Atkinson Hyperlegible", system-ui, sans-serif;
  --fuente-datos:   "JetBrains Mono", "Courier New", monospace;

  --radio-xs:   10px;
  --radio-sm:   16px;
  --radio-md:   24px;
  --radio-lg:   32px;
  --radio-pill: 999px;

  --sombra-flotante: 0 8px 32px rgba(58,58,58,0.10), 0 2px 8px rgba(58,58,58,0.06);
  --sombra-suave:    0 4px 14px rgba(58,58,58,0.08);
  --sombra-hud:      0 4px 24px rgba(58,58,58,0.12), 0 1px 4px rgba(58,58,58,0.08);

  --dur:    320ms;
  --ease:   cubic-bezier(0.22, 1, 0.36, 1);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-crema);
  color: var(--color-texto);
  font-family: var(--fuente-cuerpo);
  line-height: 1.55;
  min-height: 100vh;
}

button:focus-visible, a:focus-visible {
  outline: 3px solid var(--color-cielo);
  outline-offset: 3px;
  border-radius: var(--radio-xs);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ============================================================
   PANTALLA DE BIENVENIDA
   ============================================================ */
.pantalla-bienvenida {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 40px 24px;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(91,127,166,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 90%, rgba(217,140,122,0.10) 0%, transparent 60%),
    linear-gradient(180deg, var(--color-crema) 0%, var(--color-crema-suave) 100%);
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* Decoración ambiental */
.pantalla-bienvenida::before,
.pantalla-bienvenida::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.35;
}
.pantalla-bienvenida::before {
  width: 340px; height: 340px;
  background: radial-gradient(circle, var(--color-mostaza) 0%, transparent 70%);
  top: -120px; right: -100px;
}
.pantalla-bienvenida::after {
  width: 280px; height: 280px;
  background: radial-gradient(circle, var(--color-cielo) 0%, transparent 70%);
  bottom: -80px; left: -80px;
}

.bienvenida-card {
  background: var(--color-vidrio);
  border: 1.5px solid rgba(227,220,201,0.7);
  border-radius: var(--radio-lg);
  box-shadow: var(--sombra-flotante);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 40px 36px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  max-width: 380px;
  width: 100%;
  position: relative;
  z-index: 1;
}

.pantalla-bienvenida h1 {
  font-family: var(--fuente-display);
  font-size: clamp(26px, 5vw, 38px);
  font-weight: 700;
  color: var(--color-cielo);
  letter-spacing: -0.5px;
  line-height: 1.15;
}

.pantalla-bienvenida h1 span {
  color: var(--color-terracota);
}

.mascota-contenedor { width: 120px; height: 120px; flex-shrink: 0; }
.mascota-img { width: 100%; height: 100%; object-fit: contain; }

.globo-dialogo {
  background: #fff;
  border: 1.5px solid var(--color-borde);
  border-radius: var(--radio-md);
  padding: 10px 18px;
  font-size: 15px;
  color: var(--color-texto-suave);
  max-width: 280px;
  text-align: center;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  position: relative;
}
.globo-dialogo::before {
  content: "";
  position: absolute;
  top: -7px; left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top: none;
  border-bottom-color: var(--color-borde);
}
.globo-dialogo::after {
  content: "";
  position: absolute;
  top: -5px; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top: none;
  border-bottom-color: #fff;
}
.globo-dialogo.visible { opacity: 1; transform: translateY(0); }

.boton-iniciar-sesion {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  border: 2px solid var(--color-borde);
  border-radius: var(--radio-pill);
  padding: 13px 26px;
  font-size: 16px;
  font-weight: 700;
  color: var(--color-texto);
  box-shadow: var(--sombra-suave);
  transition:
    transform var(--dur) var(--ease),
    box-shadow var(--dur) var(--ease),
    border-color 200ms ease;
  width: 100%;
  justify-content: center;
}
.boton-iniciar-sesion:hover {
  transform: translateY(-3px);
  box-shadow: var(--sombra-flotante);
  border-color: var(--color-cielo);
}
.boton-iniciar-sesion:active { transform: translateY(-1px); }
.boton-iniciar-sesion svg { width: 22px; height: 22px; flex-shrink: 0; }

/* ============================================================
   HUD — ISLA DINÁMICA FLOTANTE
   ============================================================ */
.hud-wrapper {
  position: sticky;
  top: 12px;
  z-index: 100;
  padding: 0 16px;
  pointer-events: none;
}

.hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 16px;
  background: var(--color-vidrio);
  border: 1.5px solid rgba(227,220,201,0.75);
  border-radius: var(--radio-pill);
  box-shadow: var(--sombra-hud);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  pointer-events: all;
  max-width: 680px;
  margin: 0 auto;
  transition: box-shadow 300ms ease;
}

.hud:hover { box-shadow: 0 8px 36px rgba(58,58,58,0.15), 0 2px 8px rgba(58,58,58,0.08); }

.hud-usuario { display: flex; align-items: center; gap: 10px; }
.hud-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2.5px solid var(--color-cielo);
  object-fit: cover;
  flex-shrink: 0;
}
.hud-saludo {
  font-family: var(--fuente-display);
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}

.hud-stats {
  display: flex;
  gap: 14px;
  font-family: var(--fuente-datos);
  font-size: 13px;
  font-weight: 600;
}
.hud-stat {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--color-crema-suave);
  border: 1px solid var(--color-borde);
  border-radius: var(--radio-pill);
  padding: 4px 10px;
}
.hud-moneda-icono {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--color-mostaza);
  display: inline-block;
  flex-shrink: 0;
}

.hud nav { display: flex; gap: 6px; }
.hud nav button {
  background: var(--color-crema-suave);
  border: 1.5px solid var(--color-borde);
  border-radius: var(--radio-pill);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-texto);
  transition:
    background 200ms ease,
    border-color 200ms ease,
    transform 150ms ease;
}
.hud nav button:hover {
  background: var(--color-borde);
  transform: translateY(-1px);
}
.hud nav button:active { transform: translateY(0); }
.hud nav button.nav-activo {
  background: var(--color-cielo);
  border-color: var(--color-cielo);
  color: #fff;
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
main {
  padding: 24px 16px 48px;
  max-width: 720px;
  margin: 0 auto;
}

.seccion-app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding-top: 12px;
}

/* ============================================================
   BLOQUES DE SABER — PREGUNTAS ADAPTATIVAS
   ============================================================ */
.pregunta-texto {
  font-family: var(--fuente-display);
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  color: var(--color-texto);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.bloques-grilla {
  display: grid;
  grid-template-columns: repeat(2, minmax(120px, 1fr));
  gap: 14px;
  max-width: 320px;
  width: 100%;
}

.bloque-saber {
  position: relative;
  background: linear-gradient(145deg, #f5d77a, var(--color-mostaza));
  border: none;
  border-radius: var(--radio-md);
  padding: 22px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  box-shadow: 0 4px 16px rgba(232,196,104,0.30), 0 2px 4px rgba(58,58,58,0.06), inset 0 1px 0 rgba(255,255,255,0.4);
  transition:
    transform 220ms var(--ease),
    box-shadow 220ms var(--ease),
    background 220ms ease;
  overflow: hidden;
  animation: flotarBloque 2.8s ease-in-out infinite;
}

.bloque-saber:nth-child(2) { animation-delay: 0.2s; }
.bloque-saber:nth-child(3) { animation-delay: 0.4s; }
.bloque-saber:nth-child(4) { animation-delay: 0.6s; }

@keyframes flotarBloque {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-4px); }
}

.bloque-saber:not(:disabled):hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 10px 28px rgba(232,196,104,0.40), 0 4px 8px rgba(58,58,58,0.08);
  animation-play-state: paused;
}

.bloque-saber:not(:disabled):active {
  transform: translateY(-2px) scale(0.98);
}

.bloque-saber:disabled { animation-play-state: paused; }

.bloque-signo {
  font-family: var(--fuente-display);
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.bloque-valor {
  font-family: var(--fuente-datos);
  font-size: 22px;
  font-weight: 700;
  color: var(--color-texto);
}

.bloque-acierto {
  background: linear-gradient(145deg, #95c8a4, var(--color-sauce)) !important;
  box-shadow: 0 4px 16px rgba(127,174,142,0.35), 0 2px 4px rgba(58,58,58,0.06), inset 0 1px 0 rgba(255,255,255,0.4) !important;
}

.bloque-intenta-de-nuevo {
  background: var(--color-crema-suave) !important;
  box-shadow: none !important;
  opacity: 0.55;
}

.moneda-flotante {
  position: absolute; top: 50%; left: 50%;
  font-size: 18px; color: var(--color-mostaza);
  pointer-events: none;
  animation: flotar-moneda 700ms ease-out forwards;
}
@keyframes flotar-moneda {
  0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
  60%  { transform: translate(-50%, -160%) scale(1.2); opacity: 1; }
  100% { transform: translate(-50%, -210%) scale(0.8); opacity: 0; }
}

/* ============================================================
   SELECCIÓN DE PILOTOS
   ============================================================ */
.pilotos-grilla {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.tarjeta-piloto {
  background: #fff;
  border: 2px solid var(--color-borde);
  border-radius: var(--radio-md);
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 116px;
  box-shadow: var(--sombra-suave);
  transition:
    transform 220ms var(--ease),
    border-color 220ms ease,
    box-shadow 220ms ease;
}
.tarjeta-piloto:hover {
  transform: translateY(-5px);
  border-color: var(--color-piloto, var(--color-cielo));
  box-shadow: 0 8px 24px rgba(58,58,58,0.12);
}
.tarjeta-piloto:active { transform: translateY(-2px); }
.tarjeta-piloto span {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-texto-suave);
  text-align: center;
}

.vehiculo-preview {
  width: 64px; height: 38px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.3);
}

/* ============================================================
   CANVAS DE KART — MARCO RETRO-FUTURISTA
   ============================================================ */
.kart-frame {
  background: #1a1a2e;
  border-radius: var(--radio-md);
  padding: 10px;
  box-shadow:
    0 0 0 1.5px rgba(91,127,166,0.4),
    0 0 20px rgba(91,127,166,0.15),
    0 8px 32px rgba(0,0,0,0.18);
  position: relative;
  width: 100%;
  max-width: 640px;
}

.kart-frame::before {
  content: "● ● ●";
  display: block;
  color: rgba(91,127,166,0.5);
  font-size: 10px;
  letter-spacing: 4px;
  padding: 0 4px 8px;
  font-family: var(--fuente-datos);
}

.kart-canvas {
  display: block;
  width: 100%;
  border-radius: 12px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
}

.titulo-seccion {
  font-family: var(--fuente-display);
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  color: var(--color-cielo);
  letter-spacing: -0.3px;
}

/* ============================================================
   CONTENEDOR PREGUNTA KART
   ============================================================ */
#contenedor-pregunta-kart {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

/* ============================================================
   UTILS
   ============================================================ */
[hidden] { display: none !important; }
</style>
</head>

/* ============================================================
   1. CONFIGURACIÓN CENTRALIZADA DE ASSETS (marca blanca)
   ============================================================ */
const BASE_ASSETS = "/assets";

const ASSETS = {
  FAVICON:             `${BASE_ASSETS}/favicon.ico`,
  LOGIN_BACKGROUND:    `${BASE_ASSETS}/textures/fondo-bienvenida.webp`,

  ],
  VEHICULO_MODELO_3D: `${BASE_ASSETS}/models/vehiculo.glb`,
  FUENTE_DISPLAY:     `${BASE_ASSETS}/fonts/fuente-display.woff2`,
  FUENTE_CUERPO:      `${BASE_ASSETS}/fonts/fuente-cuerpo.woff2`,
  SONIDO_ACIERTO:     `${BASE_ASSETS}/audio/acierto.mp3`,
  SONIDO_VICTORIA:    `${BASE_ASSETS}/audio/victoria.mp3`,
};

/* ============================================================

import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import { getFirestore, doc, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* Credenciales reales del proyecto tier-e6a45 */
const firebaseConfig = {
  apiKey:            "AIzaSyAmF7xlObPgrrJf47iBNYIjIkq5TjPkVqY",
  authDomain:        "tier-e6a45.firebaseapp.com",
  projectId:         "tier-e6a45",
  storageBucket:     "tier-e6a45.firebasestorage.app",
  messagingSenderId: "1067748529919",
  appId:             "1:1067748529919:web:c6b519be184bf93c1e9eca",

};

/* Instancias correctas del Web SDK */
const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

provider.setCustomParameters({ prompt: "select_account" });

/* ============================================================
   3. ESTADO Y PERSISTENCIA EN FIRESTORE
   ============================================================ */
function estadoInicial() {
  return {
    monedas: 0,
    estrellas: 0,
    nivelActual: 1,
    nivelAdaptativo: 1,
    nivelesCompletados: [],
    pilotoElegido: null,
    ajustes: { sonidoActivo: true, vozActiva: true, animacionesReducidas: false },
  };
}

async function guardarProgreso(uid, estado) {
  if (!uid) return;
  try {
    await setDoc(
      doc(db, "usuarios", uid),
      { ...estado, actualizadoEn: new Date().toISOString() },
      { merge: true }
    );
    console.log("[Tier] Progreso sincronizado en Firestore.");
  } catch (error) {
    console.error("[Tier] No se pudo guardar el progreso:", error);
  }
}

async function cargarProgreso(uid) {
  if (!uid) return estadoInicial();
  try {
    const ref  = doc(db, "usuarios", uid);
    const snap = await getDoc(ref);
    if (snap.exists()) return { ...estadoInicial(), ...snap.data() };
    const inicial = estadoInicial();
    await setDoc(ref, { ...inicial, creadoEn: new Date().toISOString() });
    return inicial;
  } catch (error) {
    console.error("[Tier] No se pudo cargar el progreso:", error);
    return estadoInicial();
  }
}

/* ============================================================
   5. AUDIO — síntesis 8-bit con Web Audio API
   ============================================================ */
let contextoAudio = null;
let silenciado    = false;

function obtenerContextoAudio() {
  if (!contextoAudio)
    contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
  return contextoAudio;
}

function reproducirTono(frecuencia, duracion = 0.12, volumen = 0.05, retraso = 0) {
  if (silenciado) return;
  const ctx   = obtenerContextoAudio();
  const ahora = ctx.currentTime + retraso;
  const osc   = ctx.createOscillator();
  const gain  = ctx.createGain();
  osc.type = "square";
  osc.frequency.setValueAtTime(frecuencia, ahora);
  gain.gain.setValueAtTime(volumen, ahora);
  gain.gain.exponentialRampToValueAtTime(0.0001, ahora + duracion);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ahora);
  osc.stop(ahora + duracion);
}

function sonidoClicSuave()    { reproducirTono(440, 0.05, 0.03); }
function sonidoAcierto()      { reproducirTono(987.77, 0.09, 0.05, 0); reproducirTono(1318.51, 0.12, 0.05, 0.08); }
function sonidoIntentaDeNuevo(){ reproducirTono(392.0, 0.15, 0.04, 0); }
function sonidoVictoriaNivel() { [523.25, 659.25, 783.99, 1046.5].forEach((n, i) => reproducirTono(n, 0.18, 0.05, i * 0.12)); }
function sonidoAvanceKart()    { reproducirTono(660, 0.07, 0.04); }

/* ============================================================
   7. PREGUNTAS ADAPTATIVAS + BLOQUES DE SABER
   ============================================================ */
function generarPregunta(nivelAdaptativo = 1) {
  const rango = { 1: 5, 2: 10, 3: 20 }[nivelAdaptativo] || 5;
  const a = Math.floor(Math.random() * rango) + 1;
  const b = Math.floor(Math.random() * rango) + 1;
  const respuestaCorrecta = a + b;

  const opciones = new Set([respuestaCorrecta]);
  while (opciones.size < 4) {
    const distractor = respuestaCorrecta + (Math.floor(Math.random() * 5) - 2);
    if (distractor >= 0 && distractor !== respuestaCorrecta) opciones.add(distractor);
  }
  return { texto: `¿Cuánto es ${a} + ${b}?`, opciones: barajar([...opciones]), respuestaCorrecta };
}

function barajar(arreglo) {
  const copia = [...arreglo];
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}

function ajustarNivelAdaptativo(nivelActual, historialReciente) {
  const ultimos3 = historialReciente.slice(-3);
  const ultimos2 = historialReciente.slice(-2);
  if (ultimos3.length === 3 && ultimos3.every(Boolean))              return Math.min(3, nivelActual + 1);
  if (ultimos2.length === 2 && ultimos2.every((r) => r === false))   return Math.max(1, nivelActual - 1);
  return nivelActual;
}

function renderizarPregunta(idContenedor, pregunta, onResultado) {
  const contenedor = document.getElementById(idContenedor);
  if (!contenedor) return;
  contenedor.innerHTML = "";

  const titulo = document.createElement("p");
  titulo.className   = "pregunta-texto";
  titulo.textContent = pregunta.texto;
  contenedor.appendChild(titulo);

  const grilla = document.createElement("div");
  grilla.className = "bloques-grilla";

  pregunta.opciones.forEach((opcion) => {
    const boton = document.createElement("button");
    boton.className = "bloque-saber";
    boton.type      = "button";
    boton.setAttribute("aria-label", `Responder ${opcion}`);
    boton.innerHTML = `<span class="bloque-signo">?</span><span class="bloque-valor">${opcion}</span>`;

    boton.addEventListener("click", () => {
      grilla.querySelectorAll("button").forEach((b) => (b.disabled = true));
      const esCorrecta = opcion === pregunta.respuestaCorrecta;
      if (esCorrecta) {
        boton.classList.add("bloque-acierto");
        emitirMonedaDesdeBloque(boton);
        sonidoAcierto();
      } else {
        boton.classList.add("bloque-intenta-de-nuevo");
        sonidoIntentaDeNuevo();
      }
      setTimeout(() => onResultado(esCorrecta), esCorrecta ? 700 : 500);
    });

    grilla.appendChild(boton);
  });

  contenedor.appendChild(grilla);
}

function emitirMonedaDesdeBloque(boton) {
  const moneda = document.createElement("span");
  moneda.className = "moneda-flotante";
  moneda.textContent = "●";
  moneda.setAttribute("aria-hidden", "true");
  boton.appendChild(moneda);
  moneda.addEventListener("animationend", () => moneda.remove());
}

/* ============================================================
   8. AVENTURA KART — minijuego en Canvas 2D
   ============================================================ */
const PILOTOS = [
  { id: "rojo",  nombre: "Piloto Rojo",  color: "#D98C7A", sprite: ASSETS.VEHICULOS_SELECCION?.[0] },
  { id: "azul",  nombre: "Piloto Azul",  color: "#5B7FA6", sprite: ASSETS.VEHICULOS_SELECCION?.[1] },
  { id: "verde", nombre: "Piloto Verde", color: "#7FAE8E", sprite: ASSETS.VEHICULOS_SELECCION?.[2] },
];

const META_DISTANCIA     = 1000;
const AVANCE_POR_ACIERTO = 110;

let estadoCarrera = { distancia: 0, piloto: null, historial: [] };

function renderizarSeleccionPiloto(idContenedor, onElegir) {
  const contenedor = document.getElementById(idContenedor);
  if (!contenedor) return;
  contenedor.innerHTML = `<h3 class="titulo-seccion">Elige tu vehículo</h3>`;

  const grilla = document.createElement("div");
  grilla.className = "pilotos-grilla";

  PILOTOS.forEach((piloto) => {
    const tarjeta = document.createElement("button");
    tarjeta.type      = "button";
    tarjeta.className = "tarjeta-piloto";
    tarjeta.setAttribute("aria-label", `Elegir ${piloto.nombre}`);
    tarjeta.style.setProperty("--color-piloto", piloto.color);
    tarjeta.innerHTML = `
      <div class="vehiculo-preview" style="background:${piloto.color}"></div>
      <span>${piloto.nombre}</span>
    `;
    tarjeta.addEventListener("click", () => {
      estadoCarrera.piloto = piloto;
      onElegir(piloto.id);
    });
    grilla.appendChild(tarjeta);
  });

  contenedor.appendChild(grilla);
}

function iniciarCarrera({ idCanvas, idPregunta, nivelAdaptativoInicial = 1, onCambioNivel, onMeta }) {
  const canvas = document.getElementById(idCanvas);
  if (!canvas) return;
  const ctx = canvas.getContext("2d");

  estadoCarrera.distancia = 0;
  estadoCarrera.historial = [];
  let nivelAdaptativo = nivelAdaptativoInicial;

  dibujarPista(ctx, canvas, estadoCarrera.distancia);

  function siguientePregunta() {
    const pregunta = generarPregunta(nivelAdaptativo);
    renderizarPregunta(idPregunta, pregunta, (correcto) => {
      estadoCarrera.historial.push(correcto);
      const nuevoNivel = ajustarNivelAdaptativo(nivelAdaptativo, estadoCarrera.historial);
      if (nuevoNivel !== nivelAdaptativo) {
        nivelAdaptativo = nuevoNivel;
        onCambioNivel?.(nivelAdaptativo);
      }

      if (correcto) {
        estadoCarrera.distancia = Math.min(META_DISTANCIA, estadoCarrera.distancia + AVANCE_POR_ACIERTO);
        sonidoAvanceKart();
        animarAvance(ctx, canvas, estadoCarrera.distancia);
      }

      if (estadoCarrera.distancia >= META_DISTANCIA) {
        sonidoVictoriaNivel();
        document.getElementById(idPregunta).innerHTML = "";
        onMeta?.();
        return;
      }
      siguientePregunta();
    });
  }

  siguientePregunta();
}

function animarAvance(ctx, canvas, distanciaObjetivo) {
  const duracionMs       = 450;
  const inicio           = performance.now();
  const distanciaInicial = distanciaObjetivo - AVANCE_POR_ACIERTO;

  function paso(ahora) {
    const t              = Math.min(1, (ahora - inicio) / duracionMs);
    const distanciaActual = distanciaInicial + (distanciaObjetivo - distanciaInicial) * t;
    dibujarPista(ctx, canvas, distanciaActual);
    if (t < 1) requestAnimationFrame(paso);
  }
  requestAnimationFrame(paso);
}

function dibujarPista(ctx, canvas, distancia) {
  const ancho   = canvas.width;
  const alto    = canvas.height;
  const progreso = distancia / META_DISTANCIA;

  /* Cielo */
  ctx.fillStyle = "#CFE3EC";
  ctx.fillRect(0, 0, ancho, alto * 0.55);

  /* Asfalto */
  ctx.fillStyle = "#9C9C9C";
  ctx.fillRect(0, alto * 0.55, ancho, alto * 0.45);

  /* Línea central */
  ctx.strokeStyle = "#FAF6EF";
  ctx.lineWidth   = 4;
  ctx.setLineDash([18, 18]);
  ctx.beginPath();
  ctx.moveTo(0, alto * 0.78);
  ctx.lineTo(ancho, alto * 0.78);
  ctx.stroke();
  ctx.setLineDash([]);

  /* Meta */
  const xMeta = ancho - 50;
  ctx.fillStyle = "#3A3A3A";
  ctx.fillRect(xMeta, alto * 0.45, 4, alto * 0.4);
  ctx.fillStyle = "#D98C7A";
  ctx.fillRect(xMeta + 4, alto * 0.45, 22, 16);

  /* Kart */
  const piloto = estadoCarrera.piloto || PILOTOS[0];
  const xKart  = 40 + progreso * (xMeta - 90);
  const yKart  = alto * 0.78;
  dibujarKart(ctx, xKart, yKart, piloto.color);

  /* Barra de progreso */
  ctx.fillStyle = "#E8C46844";
  ctx.fillRect(20, 14, ancho - 40, 10);
  ctx.fillStyle = "#E8C468";
  ctx.fillRect(20, 14, (ancho - 40) * progreso, 10);
}

function dibujarKart(ctx, x, y, color) {
  ctx.save();
  ctx.translate(x, y);

  /* Sombra */
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.beginPath();
  ctx.ellipse(0, 16, 26, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  /* Carrocería */
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-24, -10, 48, 22, 8);
  ctx.fill();

  /* Cabina */
  ctx.fillStyle = "#FAF6EF";
  ctx.beginPath();
  ctx.roundRect(-10, -20, 24, 14, 6);
  ctx.fill();

  /* Ruedas */
  ctx.fillStyle = "#3A3A3A";
  ctx.beginPath();
  ctx.arc(-16, 14, 7, 0, Math.PI * 2);
  ctx.arc(16, 14, 7, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

let progreso      = null;

  await guardarProgreso(usuarioActual.uid, progreso);
}

function iniciarModuloKart() {
  const contenedorSeleccion = document.getElementById("seleccion-piloto");
  const contenedorJuego     = document.getElementById("juego-kart");
  contenedorJuego.hidden    = true;
  contenedorSeleccion.hidden = false;

  renderizarSeleccionPiloto("seleccion-piloto", () => {
    contenedorSeleccion.hidden = true;
    contenedorJuego.hidden     = false;

    iniciarCarrera({
      idCanvas:               "canvas-pista",
      idPregunta:             "contenedor-pregunta-kart",
      nivelAdaptativoInicial: progreso.nivelAdaptativo,
      onCambioNivel: (nuevoNivel) => {
        progreso.nivelAdaptativo = nuevoNivel;
        sincronizar();
      },
      onMeta: () => {
        progreso.estrellas += 1;
        progreso.monedas   += 5;
        inicializarHud();
        sincronizar();
        decirMascota("globo-app", "¡Llegaste a la meta! Qué bien lo hiciste. 🎉");
      },
    });
  });
}

function mostrarSeccion(idSeccion) {

    s.hidden = s.id !== idSeccion;
  });
  /* Marcar botón activo en nav */
  document.querySelectorAll(".hud nav button[id^='nav-']").forEach((b) => {
    b.classList.toggle("nav-activo", b.id === `nav-${idSeccion.replace("seccion-", "")}`);
  });
}

   10. EVENTOS
   ============================================================ */

/* LOGIN — async/await + try/catch con manejo de errores específicos */
btnIniciarSesion.addEventListener("click", async () => {
  sonidoClicSuave();
  btnIniciarSesion.disabled = true;
  try {
    await iniciarSesionGoogle();
    /* onAuthStateChanged toma el control a partir de aquí */
  } catch (error) {
    console.error("[Tier] Falló el inicio de sesión:", error.code, error.message);
    switch (error.code) {
      case "auth/popup-blocked":
        decirMascota("globo-bienvenida", "Tu navegador bloqueó la ventana emergente. Permítela e inténtalo de nuevo.");
        break;
      case "auth/popup-closed-by-user":
        decirMascota("globo-bienvenida", "Cerraste la ventana antes de completar. ¿Lo intentamos otra vez?");
        break;
      case "auth/cancelled-popup-request":
        /* Silencioso: el usuario abrió otro popup antes de cerrar el anterior */
        break;
      default:
        decirMascota("globo-bienvenida", "No pudimos iniciar sesión. ¿Probamos otra vez?");
    }
  } finally {
    btnIniciarSesion.disabled = false;
  }
});

btnCerrarSesion.addEventListener("click", async () => {
  sonidoClicSuave();
  await cerrarSesionApp();
});

document.getElementById("nav-aventura-kart").addEventListener("click", () => {
  sonidoClicSuave();
  mostrarSeccion("seccion-kart");
  iniciarModuloKart();
});

document.getElementById("nav-inicio").addEventListener("click", () => {
  sonidoClicSuave();
  mostrarSeccion("seccion-inicio");
});

/* ============================================================
   11. OBSERVER DE AUTH — entrada/salida de sesión
   ============================================================ */
onAuthStateChanged(auth, async (user) => {
  if (user) {
    usuarioActual = user;
    progreso      = await cargarProgreso(user.uid);
    alternarVistas(true);
    inicializarHud();
    renderizarMascota("mascota-app");
    decirMascota("globo-app", "¡Vamos a jugar y aprender juntos!");
    mostrarSeccion("seccion-inicio");
  } else {
    usuarioActual = null;
    progreso      = null;
    alternarVistas(false);
    renderizarMascota("mascota-bienvenida");
    decirMascota("globo-bienvenida", "Hola, soy Bolu. ¿Listo para jugar?");
  }
});
