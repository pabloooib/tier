
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reino de Tier — Retro Kart</title>
<link rel="icon" href="mario-assets/favicon.ico"/>
<style>
/* ════════════════════════════════════════════════════
   FUENTE MARIO KART DESDE ASSETS DEL ZIP
════════════════════════════════════════════════════ */
@font-face {
  font-family: "MarioKart";
  src: url("mario-assets/fonts/mario_kart_f2.ttf") format("truetype");
  font-weight: 400 700;
  font-display: swap;
}

/* ════════════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════════════ */
:root {
  --c-bg:        #080c18;
  --c-bg2:       #0d1224;
  --c-panel:     #111827;
  --c-panel2:    #1a2235;
  --c-sky:       #4f8ef7;
  --c-sky-glow:  rgba(79,142,247,0.35);
  --c-gold:      #f5c842;
  --c-gold-dim:  rgba(245,200,66,0.18);
  --c-terra:     #e8725a;
  --c-sage:      #56c99a;
  --c-purple:    #9b72f5;
  --c-cream:     #eef2ff;
  --c-txt:       #e8ecf5;
  --c-txt-soft:  #7a8aaa;
  --c-border:    rgba(79,142,247,0.18);
  --c-border2:   rgba(79,142,247,0.08);
  --c-glass:     rgba(17,24,39,0.85);

  --f-game: "MarioKart","Trebuchet MS",system-ui,sans-serif;
  --f-body: system-ui,-apple-system,sans-serif;
  --f-mono: "JetBrains Mono","Courier New",monospace;

  --r-xs:   8px;
  --r-sm:   14px;
  --r-md:   20px;
  --r-lg:   28px;
  --r-pill: 999px;

  --sh-sky:    0 0 32px rgba(79,142,247,0.25), 0 4px 16px rgba(0,0,0,0.5);
  --sh-gold:   0 0 24px rgba(245,200,66,0.3),  0 4px 12px rgba(0,0,0,0.4);
  --sh-panel:  0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
  --dur: 280ms;
  --ease: cubic-bezier(0.22,1,0.36,1);
}

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after { animation-duration:0.001ms!important; transition-duration:0.001ms!important; }
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

html { scroll-behavior:smooth; }

body {
  background: var(--c-bg);
  color: var(--c-txt);
  font-family: var(--f-body);
  line-height: 1.55;
  min-height: 100dvh;
  overflow-x: hidden;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }

button:focus-visible, a:focus-visible {
  outline: 2px solid var(--c-sky);
  outline-offset: 3px;
  border-radius: var(--r-xs);
}

/* ════════════════════════════════════════════════════
   PANTALLA BIENVENIDA — ARCADE NIGHT
════════════════════════════════════════════════════ */
.welcome-screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,142,247,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 90% 100%, rgba(155,114,245,0.16) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 5%  90%,  rgba(86,201,154,0.12) 0%, transparent 55%),
    linear-gradient(180deg, #060a14 0%, #0a1020 60%, #080c18 100%);
}

/* Estrellas de fondo animadas */
.stars-bg {
  position:absolute; inset:0; pointer-events:none; overflow:hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%,100% { opacity:0.15; transform:scale(1); }
  50%      { opacity:0.9;  transform:scale(1.4); }
}

/* Línea de pista decorativa */
.welcome-track-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--c-sky), var(--c-gold), var(--c-sky), transparent);
  opacity: 0.5;
}

.welcome-card {
  background: var(--c-glass);
  border: 1px solid rgba(79,142,247,0.25);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-panel), 0 0 80px rgba(79,142,247,0.1);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 48px 44px 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  max-width: 420px;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* Esquinas decorativas */
.welcome-card::before,
.welcome-card::after {
  content: "";
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--c-sky);
  border-style: solid;
  opacity: 0.6;
}
.welcome-card::before { top:12px; left:12px;  border-width: 2px 0 0 2px; }
.welcome-card::after  { bottom:12px; right:12px; border-width: 0 2px 2px 0; }

.welcome-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.welcome-eyebrow {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--c-sky);
  text-transform: uppercase;
  opacity: 0.8;
}

.welcome-card h1 {
  font-family: var(--f-game);
  font-size: clamp(26px,6vw,40px);
  color: var(--c-cream);
  text-align: center;
  line-height: 1.15;
  letter-spacing: 1.5px;
  text-shadow: 0 0 30px rgba(79,142,247,0.5);
}
.welcome-card h1 em {
  font-style: normal;
  color: var(--c-gold);
  text-shadow: 0 0 20px rgba(245,200,66,0.5);
}

.mascot-wrap { width: 110px; height: 110px; flex-shrink: 0; }
.mascot-wrap svg, .mascot-wrap img { width:100%; height:100%; object-fit:contain; }

.speech-bubble {
  background: var(--c-panel);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 10px 18px;
  font-size: 13px;
  color: var(--c-txt-soft);
  text-align: center;
  max-width: 280px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  position: relative;
}
.speech-bubble::after {
  content:"";
  position:absolute;
  bottom:-8px; left:50%;
  transform:translateX(-50%);
  border:8px solid transparent;
  border-top-color: var(--c-panel);
  border-bottom:none;
}
.speech-bubble.visible { opacity:1; transform:translateY(0); }

.btn-login {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: linear-gradient(135deg, #1a2a4a 0%, #0f1c38 100%);
  border: 1.5px solid rgba(79,142,247,0.4);
  border-radius: var(--r-pill);
  padding: 15px 32px;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--f-body);
  color: var(--c-cream);
  box-shadow: var(--sh-sky);
  width: 100%;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color 200ms, background 200ms;
  position: relative;
  overflow: hidden;
}
.btn-login::before {
  content:"";
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(79,142,247,0.15), transparent);
  opacity:0;
  transition: opacity 200ms;
}
.btn-login:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 40px rgba(79,142,247,0.4), 0 8px 24px rgba(0,0,0,0.5);
  border-color: var(--c-sky);
}
.btn-login:hover::before { opacity:1; }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity:0.5; pointer-events:none; }
.btn-login svg { width:22px; height:22px; flex-shrink:0; }

/* Info controles en bienvenida */
.controls-hint {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.ctrl-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--c-panel);
  border: 1px solid var(--c-border2);
  border-radius: var(--r-pill);
  padding: 5px 12px;
  font-size: 11px;
  color: var(--c-txt-soft);
  font-family: var(--f-mono);
}
.ctrl-badge span { font-size:14px; }

/* ════════════════════════════════════════════════════
   HUD — BARRA SUPERIOR PREMIUM
════════════════════════════════════════════════════ */
.hud-shell {
  position: sticky;
  top: 0;
  z-index: 300;
  padding: 8px 12px;
  background: rgba(8,12,24,0.95);
  border-bottom: 1px solid var(--c-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  max-width: 800px;
  margin: 0 auto;
}

.hud-user { display:flex; align-items:center; gap:10px; }
.hud-avatar {
  width:36px; height:36px; border-radius:50%;
  border:2px solid var(--c-sky);
  object-fit:cover; flex-shrink:0;
  box-shadow: 0 0 12px var(--c-sky-glow);
}
.hud-name {
  font-family: var(--f-game);
  font-size: 13px;
  color: var(--c-cream);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width: 130px;
}

.hud-stats { display:flex; gap:8px; }
.hud-chip {
  display:flex; align-items:center; gap:5px;
  background: var(--c-panel);
  border: 1px solid var(--c-border);
  border-radius: var(--r-pill);
  padding: 4px 11px;
  font-family: var(--f-mono);
  font-size:12px; font-weight:700;
  color: var(--c-cream);
}
.chip-gold  { border-color: rgba(245,200,66,0.3); color: var(--c-gold); }
.chip-star  { border-color: rgba(155,114,245,0.3); color: var(--c-purple); }
.chip-lvl   { border-color: rgba(86,201,154,0.3);  color: var(--c-sage); }

.hud-nav { display:flex; gap:5px; align-items:center; }
.hud-nav button {
  background: var(--c-panel);
  border: 1px solid var(--c-border);
  border-radius: var(--r-pill);
  padding: 5px 14px;
  font-size: 12px; font-weight:700;
  color: var(--c-txt-soft);
  transition: all 180ms;
}
.hud-nav button:hover { color:var(--c-cream); border-color:var(--c-sky); }
.hud-nav button.active {
  background: linear-gradient(135deg,rgba(79,142,247,0.25),rgba(79,142,247,0.1));
  border-color: var(--c-sky);
  color: var(--c-sky);
  box-shadow: 0 0 12px rgba(79,142,247,0.2);
}
.btn-logout {
  background: rgba(232,114,90,0.12) !important;
  border-color: rgba(232,114,90,0.3) !important;
  color: var(--c-terra) !important;
}
.btn-logout:hover {
  background: rgba(232,114,90,0.22) !important;
}

/* Indicador de gamepad */
.gamepad-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--c-txt-soft);
  padding: 3px 8px;
  border-radius: var(--r-pill);
  border: 1px solid var(--c-border2);
  transition: all 300ms;
}
.gamepad-indicator.connected {
  color: var(--c-sage);
  border-color: rgba(86,201,154,0.3);
  background: rgba(86,201,154,0.08);
}
.gamepad-dot {
  width:6px; height:6px; border-radius:50%;
  background: var(--c-txt-soft);
  transition: background 300ms;
}
.gamepad-indicator.connected .gamepad-dot { background: var(--c-sage); }

/* ════════════════════════════════════════════════════
   MAIN LAYOUT
════════════════════════════════════════════════════ */
main {
  padding: 20px 14px 80px;
  max-width: 800px;
  margin: 0 auto;
}

.section-app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding-top: 16px;
  animation: fadeUp 350ms var(--ease) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.section-title {
  font-family: var(--f-game);
  font-size: 18px;
  color: var(--c-sky);
  text-align: center;
  letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(79,142,247,0.4);
}

/* ════════════════════════════════════════════════════
   HOME — PANTALLA PRINCIPAL
════════════════════════════════════════════════════ */
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  width: 100%;
  max-width: 520px;
}

.home-card {
  background: var(--c-panel);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform var(--dur) var(--ease), border-color 200ms, box-shadow 200ms;
  text-align: center;
}
.home-card:hover {
  transform: translateY(-4px);
  border-color: var(--c-sky);
  box-shadow: var(--sh-sky);
}
.home-card-icon { font-size:28px; }
.home-card-title {
  font-family: var(--f-game);
  font-size: 13px;
  color: var(--c-cream);
}
.home-card-desc { font-size: 11px; color: var(--c-txt-soft); }

/* ════════════════════════════════════════════════════
   SELECCIÓN DE KART / PILOTO
════════════════════════════════════════════════════ */
.pilots-grid {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.pilot-card {
  background: var(--c-panel);
  border: 2px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 20px 14px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 110px;
  cursor: pointer;
  transition: transform 220ms var(--ease), border-color 220ms, box-shadow 220ms;
  position: relative;
  overflow: hidden;
}
.pilot-card::before {
  content:"";
  position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
}
.pilot-card:hover {
  transform: translateY(-6px) scale(1.03);
  border-color: var(--pilot-color, var(--c-sky));
  box-shadow: 0 0 24px color-mix(in srgb, var(--pilot-color,var(--c-sky)) 40%, transparent);
}
.pilot-swatch {
  width:56px; height:32px; border-radius:8px;
  background: var(--pilot-color, var(--c-sky));
  box-shadow: 0 4px 12px color-mix(in srgb, var(--pilot-color,var(--c-sky)) 50%, transparent);
  position: relative;
}
.pilot-swatch::after {
  content:"🏎";
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
}
.pilot-name { font-family:var(--f-game); font-size:11px; color:var(--c-txt-soft); }
.pilot-stat {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--pilot-color, var(--c-sky));
  opacity: 0.8;
}

/* ════════════════════════════════════════════════════
   CANVAS FRAME — CIRCUITO 3D
════════════════════════════════════════════════════ */
.race-frame {
  width:100%; max-width:760px;
  background: #050810;
  border-radius: var(--r-md);
  padding: 12px;
  box-shadow:
    0 0 0 1px rgba(79,142,247,0.3),
    0 0 40px rgba(79,142,247,0.12),
    0 12px 48px rgba(0,0,0,0.6);
  position: relative;
}

.race-frame-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px 10px;
}

.race-title-bar {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(79,142,247,0.55);
  text-transform: uppercase;
}

.race-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--c-txt-soft);
}

#race-canvas {
  display: block;
  width: 100%;
  height: clamp(220px, 42vw, 360px);
  border-radius: 10px;
  box-shadow: inset 0 2px 14px rgba(0,0,0,0.7);
  background: #0a0d1a;
}

.race-loading {
  position:absolute;
  inset:12px; inset-block-start:46px;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
  background: rgba(5,8,16,0.95);
  border-radius: 10px;
  font-family: var(--f-game);
  color: var(--c-sky);
  font-size: 13px;
  letter-spacing: 2px;
  backdrop-filter: blur(6px);
  transition: opacity 500ms;
  z-index: 10;
}
.race-loading.hidden { opacity:0; pointer-events:none; }

.loading-spinner {
  width:32px; height:32px;
  border:3px solid rgba(79,142,247,0.2);
  border-top-color: var(--c-sky);
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Barra de velocidad / progreso */
.race-progress-wrap {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.race-progress-label {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--c-txt-soft);
  white-space: nowrap;
  min-width: 60px;
}
.speed-bar-track {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border-radius: var(--r-pill);
  height: 8px;
  overflow: hidden;
  position: relative;
}
.speed-bar {
  height:100%;
  background: linear-gradient(90deg, var(--c-sky), var(--c-gold));
  border-radius: var(--r-pill);
  width:0%;
  transition: width 420ms var(--ease);
  box-shadow: 0 0 10px rgba(245,200,66,0.5);
  position:relative;
}
.speed-bar::after {
  content:"";
  position:absolute; right:0; top:0; bottom:0; width:8px;
  background: rgba(255,255,255,0.4);
  border-radius:var(--r-pill);
  animation: shimmer 1s ease-in-out infinite;
}
@keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:1} }
.race-progress-pct {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--c-gold);
  min-width: 32px;
  text-align: right;
}

/* Checkpoint indicators */
.checkpoints {
  display: flex;
  gap: 4px;
  margin-top: 8px;
  justify-content: center;
}
.checkpoint {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(79,142,247,0.2);
  transition: all 300ms;
}
.checkpoint.done {
  background: var(--c-gold);
  border-color: var(--c-gold);
  box-shadow: 0 0 8px rgba(245,200,66,0.5);
}
.checkpoint.current {
  background: var(--c-sky);
  border-color: var(--c-sky);
  animation: pulse-dot 1s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 4px rgba(79,142,247,0.5); }
  50%      { box-shadow: 0 0 12px rgba(79,142,247,0.9); }
}

/* ════════════════════════════════════════════════════
   BLOQUES ? — PREGUNTAS  
════════════════════════════════════════════════════ */
#kart-question-wrap {
  width:100%; max-width:760px;
  display:flex; flex-direction:column; align-items:center; gap:16px;
}

.question-header {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  justify-content: center;
}

.question-text {
  font-family: var(--f-game);
  font-size: clamp(18px,4vw,24px);
  text-align: center;
  color: var(--c-cream);
  letter-spacing: 0.5px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

.diff-badge {
  font-family: var(--f-mono);
  font-size: 10px;
  padding: 3px 9px;
  border-radius: var(--r-pill);
  border: 1px solid;
  white-space: nowrap;
}
.diff-1 { color:var(--c-sage);   border-color:rgba(86,201,154,0.4);  background:rgba(86,201,154,0.08); }
.diff-2 { color:var(--c-gold);   border-color:rgba(245,200,66,0.4);  background:rgba(245,200,66,0.08); }
.diff-3 { color:var(--c-terra);  border-color:rgba(232,114,90,0.4);  background:rgba(232,114,90,0.08); }

.blocks-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(120px,1fr));
  gap: 12px;
  max-width: 320px;
  width: 100%;
}

.block-btn {
  position: relative;
  background: linear-gradient(145deg, #1e2a42, #162036);
  border: 2px solid rgba(79,142,247,0.25);
  border-radius: var(--r-md);
  padding: 22px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  overflow: hidden;

let audioCtx=null, muted=false;
const getCtx=()=>{ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; };

function tone(freq,dur=0.12,vol=0.05,delay=0,type="square"){
  if(muted)return;
  const ctx=getCtx(), t=ctx.currentTime+delay;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t+dur);
}

/* ════════════════════════════════════════════════
   SISTEMA ADAPTATIVO DE PREGUNTAS
════════════════════════════════════════════════ */
const DIFFICULTY = {
  1: { range:5,  ops:["+"],        label:"Nivel 1 — Fácil",   class:"diff-1" },
  2: { range:10, ops:["+","-"],    label:"Nivel 2 — Medio",   class:"diff-2" },
  3: { range:20, ops:["+","-","×"],label:"Nivel 3 — Difícil", class:"diff-3" },
};

function genQuestion(level=1){
  const cfg = DIFFICULTY[level] || DIFFICULTY[1];
  const op  = cfg.ops[Math.floor(Math.random()*cfg.ops.length)];
  let a,b,correct,text;
  if(op==="+"){
    a=rnd(1,cfg.range); b=rnd(1,cfg.range);
    correct=a+b; text=`¿Cuánto es ${a} + ${b}?`;
  } else if(op==="-"){
    a=rnd(cfg.range/2,cfg.range); b=rnd(1,Math.floor(a));
    correct=a-b; text=`¿Cuánto es ${a} − ${b}?`;
  } else {
    a=rnd(2,Math.min(cfg.range,10)); b=rnd(2,Math.min(cfg.range,10));
    correct=a*b; text=`¿Cuánto es ${a} × ${b}?`;
  }
  const opts=new Set([correct]);
  let attempts=0;
  while(opts.size<4 && attempts<40){
    attempts++;
    const noise=rnd(-Math.ceil(cfg.range*0.4),Math.ceil(cfg.range*0.4));
    const d=correct+noise;
    if(d>=0 && d!==correct) opts.add(d);
  }
  return { text, options:shuffle([...opts]), correct, level, diffLabel:cfg.label, diffClass:cfg.class };
}

function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function computeNewLevel(current, hist){
  const last3=hist.slice(-3), last2=hist.slice(-2);
  if(last3.length===3 && last3.every(Boolean))    return Math.min(3,current+1);
  if(last2.length===2 && last2.every(v=>v===false)) return Math.max(1,current-1);
  return current;
}

let gamepads={}, gamepadConnected=false;
let gamepadAnswerCb=null; // callback actual para responder
let gpLastButtons=new Array(16).fill(false);

window.addEventListener("gamepadconnected",(e)=>{
  gamepads[e.gamepad.index]=e.gamepad;
  gamepadConnected=true;
  updateGamepadUI(true, e.gamepad.id);
  showToast("🎮 Mando conectado: "+e.gamepad.id.substring(0,24));
});
window.addEventListener("gamepaddisconnected",(e)=>{
  delete gamepads[e.gamepad.index];
  gamepadConnected=Object.keys(gamepads).length>0;
  updateGamepadUI(gamepadConnected,"");
});

function updateGamepadUI(connected, id){
  const el=document.getElementById("gamepad-indicator");
  const lbl=document.getElementById("gamepad-label");
  if(!el)return;
  el.classList.toggle("connected",connected);
  if(lbl) lbl.textContent = connected ? "🎮 ON" : "🎮";
}

function pollGamepad(){
  const gps=navigator.getGamepads ? navigator.getGamepads() : [];
  for(const gp of gps){
    if(!gp)continue;
    const buttons=gp.buttons;
    // Botones A(0), B(1), X(2), Y(3) → respuestas 0-3
    [0,1,2,3].forEach((btnIdx,ansIdx)=>{
      const pressed=buttons[btnIdx]?.pressed;
      if(pressed && !gpLastButtons[btnIdx] && gamepadAnswerCb){
        gamepadAnswerCb(ansIdx);
      }
      gpLastButtons[btnIdx]=!!pressed;
    });
  }
}

   RENDER DE PREGUNTA + CONTROLES
════════════════════════════════════════════════ */
function renderQuestion(wrapId, q, onResult){
  const wrap=document.getElementById(wrapId);
  if(!wrap)return;
  wrap.innerHTML="";

  // Cabecera con texto y badge de dificultad
  const header=document.createElement("div");
  header.className="question-header";
  const txt=document.createElement("p");
  txt.className="question-text";
  txt.textContent=q.text;
  const badge=document.createElement("span");
  badge.className=`diff-badge ${q.diffClass}`;
  badge.textContent=q.diffLabel;
  header.appendChild(txt);
  header.appendChild(badge);
  wrap.appendChild(header);

  // Grid de bloques
  const grid=document.createElement("div");
  grid.className="blocks-grid";
  const KEYS=["A","S","D","F"];
  const GP_BTNS=["A","B","X","Y"];

  const buttons=[];

  q.options.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.className="block-btn";
    btn.type="button";
    btn.setAttribute("aria-label",`Responder ${opt}`);
    btn.innerHTML=`
      <span class="block-key">${KEYS[i]}</span>
      <span class="block-gp">${GP_BTNS[i]}</span>
      <span class="block-sign">?</span>
      <span class="block-val">${opt}</span>
    `;
    buttons.push(btn);
    grid.appendChild(btn);
  });

  wrap.appendChild(grid);

  // Función de responder por índice
  let answered=false;
  function answer(idx){
    if(answered||idx<0||idx>=buttons.length)return;
    answered=true;
    keyAnswerCb=null;
    gamepadAnswerCb=null;

    // Limpiar touch buttons
    const tb=document.getElementById("touch-buttons");
    if(tb) tb.querySelectorAll(".touch-btn").forEach(b=>b.disabled=true);

    buttons.forEach(b=>b.disabled=true);
    const opt=q.options[idx];
    const ok=opt===q.correct;
    buttons[idx].classList.add(ok?"correct":"wrong");

    // Highlight visual de tecla
    buttons[idx].classList.remove("key-highlight");

    if(ok){
      const coin=document.createElement("span");
      coin.className="coin-burst"; coin.textContent="🪙";
      coin.setAttribute("aria-hidden","true");
      buttons[idx].appendChild(coin);
      coin.addEventListener("animationend",()=>coin.remove());
      sfxCorrect();
    } else {
      // Mostrar respuesta correcta
      const corrIdx=q.options.indexOf(q.correct);
      if(corrIdx>=0) buttons[corrIdx].classList.add("correct");
      sfxWrong();
    }
    setTimeout(()=>onResult(ok), ok?750:600);
  }

  // Activar callbacks de teclado y gamepad
  keyAnswerCb=(idx)=>{
    if(answered)return;
    // Efecto visual antes de seleccionar
    buttons[idx]?.classList.add("key-highlight");
    setTimeout(()=>{ buttons[idx]?.classList.remove("key-highlight"); answer(idx); },80);
  };
  gamepadAnswerCb=(idx)=>{ answer(idx); };

  // Click mouse normal
  buttons.forEach((btn,i)=>{
    btn.addEventListener("click",()=>answer(i));
  });

  // Controles táctiles en pantalla
  buildTouchButtons(q.options, answer);

  // Info de controles
  buildControlsInfo();
}

function buildTouchButtons(options, answerFn){
  const tb=document.getElementById("touch-buttons");
  if(!tb)return;
  tb.innerHTML="";
  const icons=["🅰️","🅱️","❎","🟡"];
  options.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.className="touch-btn answer-btn";
    btn.type="button";
    btn.setAttribute("aria-label",`Tocar para responder ${opt}`);
    btn.innerHTML=`<span class="touch-btn-icon">${icons[i]}</span><span class="touch-btn-label">${opt}</span>`;
    btn.addEventListener("click",()=>answerFn(i));
    // Feedback visual touch
    btn.addEventListener("touchstart",()=>btn.classList.add("pressing"),{passive:true});
    btn.addEventListener("touchend",()=>btn.classList.remove("pressing"),{passive:true});
    tb.appendChild(btn);
  });
}

function buildControlsInfo(){
  const ci=document.getElementById("controls-info");
  if(!ci)return;
  ci.innerHTML=`
    <div class="ctrl-item"><span class="key-badge">A</span> Opción 1</div>
    <div class="ctrl-item"><span class="key-badge">S</span> Opción 2</div>
    <div class="ctrl-item"><span class="key-badge">D</span> Opción 3</div>
    <div class="ctrl-item"><span class="key-badge">F</span> Opción 4</div>
    <div class="ctrl-item"><span class="key-badge">1-4</span> Alternativo</div>
    <div class="ctrl-item"><span class="key-badge">🎮</span> A/B/X/Y</div>
  `;
}

/* ════════════════════════════════════════════════
   THREE.JS — MOTOR 3D

import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

let threeHandle=null;

async function initThreeJS(canvasId){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return null;

  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(canvas.clientWidth,canvas.clientHeight,false);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x050810);
  scene.fog=new THREE.FogExp2(0x070b18,0.018);

  const aspect=canvas.clientWidth/canvas.clientHeight;
  const camera=new THREE.PerspectiveCamera(50,aspect,0.1,600);
  camera.position.set(0,6,16);
  camera.lookAt(0,0,0);

  const controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=0.07;
  controls.minDistance=4; controls.maxDistance=45;
  controls.maxPolarAngle=Math.PI/2.05;
  controls.enablePan=false;
  controls.autoRotate=true;
  controls.autoRotateSpeed=0.5;
  controls.enableZoom=false; // evitar conflicto con scroll en móvil

  // ── LUCES ──
  scene.add(new THREE.AmbientLight(0x223366,1.2));

  const sun=new THREE.DirectionalLight(0xfff0d0,2.8);
  sun.position.set(14,22,12);
  sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.near=0.5; sun.shadow.camera.far=120;
  sun.shadow.camera.left=-35; sun.shadow.camera.right=35;
  sun.shadow.camera.top=35;   sun.shadow.camera.bottom=-35;
  scene.add(sun);

  const fill=new THREE.DirectionalLight(0x4466cc,1.0);
  fill.position.set(-10,8,-8);
  scene.add(fill);

  const rimBlue=new THREE.PointLight(0x4f8ef7,2.2,50);
  rimBlue.position.set(0,10,-14);
  scene.add(rimBlue);

  const rimGold=new THREE.PointLight(0xf5c842,1.5,30);
  rimGold.position.set(10,4,0);
  scene.add(rimGold);

  // ── SUELO REFLECTANTE ──
  const floorMat=new THREE.MeshStandardMaterial({
    color:0x1a2040, roughness:0.6, metalness:0.4
  });
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(160,160),floorMat);
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true;
  scene.add(floor);

  // ── PARTÍCULAS ESTRELLAS ──
  const starGeo=new THREE.BufferGeometry();
  const sCnt=1200, sPos=new Float32Array(sCnt*3);
  for(let i=0;i<sCnt*3;i++) sPos[i]=(Math.random()-0.5)*300;
  starGeo.setAttribute("position",new THREE.BufferAttribute(sPos,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    color:0xaaccff, size:0.22, sizeAttenuation:true, transparent:true, opacity:0.7
  })));

  // ── TEXTURA DE SMOKE/SPARK desde assets ──
  const texLoader=new THREE.TextureLoader();
  let smokeTex=null, sparkTex=null;
  try{
    smokeTex=await texLoader.loadAsync(A.SMOKE);
    sparkTex=await texLoader.loadAsync(A.SPARK);
  }catch(_){}

  // ── PARTÍCULAS DE HUMO DEL ESCAPE ──
  const smokeGeo=new THREE.BufferGeometry();
  const smCnt=60, smPos=new Float32Array(smCnt*3), smAlpha=new Float32Array(smCnt);
  for(let i=0;i<smCnt;i++){ smPos[i*3]=smPos[i*3+1]=smPos[i*3+2]=0; smAlpha[i]=0; }
  smokeGeo.setAttribute("position",new THREE.BufferAttribute(smPos,3));
  smokeGeo.setAttribute("alpha",   new THREE.BufferAttribute(smAlpha,1));
  const smokeMat=new THREE.PointsMaterial({
    map:smokeTex||null, size:0.6, transparent:true, opacity:0.35,
    depthWrite:false, color:0x8899cc, sizeAttenuation:true
  });
  const smokePS=new THREE.Points(smokeGeo,smokeMat);
  scene.add(smokePS);

  // ── PARTÍCULAS DE SPARK ──
  const sparkGeo=new THREE.BufferGeometry();
  const spCnt=30, spPos=new Float32Array(spCnt*3);
  sparkGeo.setAttribute("position",new THREE.BufferAttribute(spPos,3));
  const sparkMat=new THREE.PointsMaterial({
    map:sparkTex||null, size:0.3, transparent:true, opacity:0,
    depthWrite:false, color:0xf5c842
  });
  const sparkPS=new THREE.Points(sparkGeo,sparkMat);
  scene.add(sparkPS);

  // ── GLB LOADER ──
  const gltfLoader=new GLTFLoader();
  const state3D={ kart:null, track:null, witch:null, wheels:[], kartProgress:0, targetProgress:0, kartPath:[], speed:0 };

  // Carga en paralelo de circuito + kart + witch
  const loadGLB=(url)=>new Promise((res,rej)=>gltfLoader.load(url,g=>res(g.scene),undefined,rej));

  const [trackScene,kartScene,witchScene,wheelScene] = await Promise.allSettled([
    loadGLB(A.TRACK_GLB),
    loadGLB(A.KART_GLB),
    loadGLB(A.WITCH_GLB),
    loadGLB(A.WHEEL_GLB),
  ]).then(rs=>rs.map(r=>r.status==="fulfilled"?r.value:null));

  if(trackScene){
    trackScene.scale.set(0.9,0.9,0.9);
    trackScene.traverse(c=>{ if(c.isMesh){ c.receiveShadow=true; c.castShadow=false; } });
    scene.add(trackScene);
    state3D.track=trackScene;
  }
  if(kartScene){
    kartScene.scale.set(0.45,0.45,0.45);
    kartScene.position.set(0,0.3,0);
    kartScene.traverse(c=>{ if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; } });
    scene.add(kartScene);
    state3D.kart=kartScene;
  }
  if(witchScene){
    witchScene.scale.set(0.25,0.25,0.25);
    witchScene.position.set(3,0.3,3);
    witchScene.traverse(c=>{ if(c.isMesh){ c.castShadow=true; } });
    scene.add(witchScene);
    state3D.witch=witchScene;
  }
  // 4 ruedas adicionales
  if(wheelScene){
    const offsets=[[-0.35,0.1,0.35],[0.35,0.1,0.35],[-0.35,0.1,-0.28],[0.35,0.1,-0.28]];
    offsets.forEach(off=>{
      const w=wheelScene.clone();
      w.scale.set(0.45,0.45,0.45);
      if(state3D.kart) state3D.kart.add(w);
      w.position.set(...off);
      state3D.wheels.push(w);
    });
  }

  // ── CAMINO CIRCULAR ──
  const PR=9, PP=200;
  state3D.kartPath=Array.from({length:PP},(_,i)=>{
    const angle=(i/PP)*Math.PI*2;
    return new THREE.Vector3(Math.cos(angle)*PR, 0.32, Math.sin(angle)*PR);
  });
  // Camino de la bruja (ligeramente desfasado)
  const witchPath=Array.from({length:PP},(_,i)=>{
    const angle=((i+30)/PP)*Math.PI*2 + Math.PI*0.3;
    return new THREE.Vector3(Math.cos(angle)*PR*1.1, 0.32, Math.sin(angle)*PR*1.1);
  });

  let witchIdx=0;
  let smIdx=0;

  // ── LOOP DE RENDER ──
  let animId=null, lastT=0;
  function animate(t){
    animId=requestAnimationFrame(animate);
    const dt=Math.min((t-lastT)/1000,0.05);
    lastT=t;

    // Gamepad poll
    pollGamepad();

    // Kart movement
    if(state3D.kart && state3D.kartPath.length>0){
      state3D.speed+=(state3D.targetProgress-state3D.kartProgress)*0.06;
      state3D.speed*=0.88;
      state3D.kartProgress=Math.min(1,Math.max(0,state3D.kartProgress+state3D.speed));
      const frac=state3D.kartProgress%1;
      const idx=Math.floor(frac*PP);
      const nxt=(idx+1)%PP;
      const pos=state3D.kartPath[idx];
      const lk=state3D.kartPath[nxt];
      state3D.kart.position.lerp(pos,0.1);
      state3D.kart.lookAt(lk);
      state3D.kart.rotation.z=Math.sin(t*0.004)*0.06;

      // Ruedas girando
      state3D.wheels.forEach(w=>{ w.rotation.x-=dt*8*state3D.speed; });
    }

    // Witch NPC
    if(state3D.witch){
      witchIdx=(witchIdx+0.2)%PP;
      const wi=Math.floor(witchIdx);
      const wn=(wi+1)%PP;
      state3D.witch.position.lerp(witchPath[wi],0.08);
      state3D.witch.lookAt(witchPath[wn]);
      state3D.witch.rotation.y+=0.01;
    }

    // Smoke particles
    {
      const pos=smokePS.geometry.attributes.position;
      const basePos=state3D.kart?state3D.kart.position:new THREE.Vector3();
      pos.array[smIdx*3]   = basePos.x + (Math.random()-0.5)*0.4;
      pos.array[smIdx*3+1] = basePos.y + 0.1;
      pos.array[smIdx*3+2] = basePos.z + (Math.random()-0.5)*0.4;
      pos.needsUpdate=true;
      smIdx=(smIdx+1)%smCnt;
      // Drift particles upward
      for(let i=0;i<smCnt;i++) pos.array[i*3+1]+=0.008;
      pos.needsUpdate=true;
    }

    // Pulsing rim lights
    rimBlue.intensity = 1.8+Math.sin(t*0.002)*0.6;
    rimGold.intensity = 1.2+Math.cos(t*0.0025)*0.4;

    controls.update();
    renderer.render(scene,camera);
  }
  animate(0);

  const ro=new ResizeObserver(()=>{
    const w=canvas.clientWidth, h=Math.max(canvas.clientHeight,1);
    renderer.setSize(w,h,false);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
  });
  ro.observe(canvas);

  return {
    advance(p){ state3D.targetProgress=p; },
    setSpeed(on){ controls.autoRotate=!on; },
    destroy(){
      if(animId) cancelAnimationFrame(animId);
      ro.disconnect();
      renderer.dispose();
    }
  };
}

  { id:"purple", name:"Mística", color:"#9b72f5", stat:"VEL ★★★ ACC ★" },
];
let chosenPilot=PILOTS[0];

function renderPilotSelect(wrapId, onChoose){
  const wrap=document.getElementById(wrapId);
  if(!wrap)return;
  wrap.innerHTML=`<h3 class="section-title">Elige tu Kart</h3>`;
  const grid=document.createElement("div");
  grid.className="pilots-grid";
  PILOTS.forEach(p=>{
    const btn=document.createElement("button");
    btn.className="pilot-card";
    btn.type="button";
    btn.style.setProperty("--pilot-color",p.color);
    btn.setAttribute("aria-label",`Elegir ${p.name}`);
    btn.innerHTML=`<div class="pilot-swatch"></div><span class="pilot-name">${p.name}</span><span class="pilot-stat">${p.stat}</span>`;
    btn.addEventListener("click",()=>{
      chosenPilot=p; sfxSelect(); onChoose(p.id);
    });
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
}

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
function showToast(msg,dur=2800){
  const t=document.getElementById("level-toast");
  if(!t)return;
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("show"),dur);
}

/* ════════════════════════════════════════════════
   TIMER DE CARRERA
════════════════════════════════════════════════ */
let raceTimer=null, raceSeconds=0;
function startRaceTimer(){
  raceSeconds=0;
  clearInterval(raceTimer);
  raceTimer=setInterval(()=>{
    raceSeconds++;
    const m=String(Math.floor(raceSeconds/60)).padStart(2,"0");
    const s=String(raceSeconds%60).padStart(2,"0");
    const el=document.getElementById("race-time");
    if(el) el.textContent=`${m}:${s}`;
  },1000);
}
function stopRaceTimer(){ clearInterval(raceTimer); }

/* ════════════════════════════════════════════════
   CHECKPOINTS UI
════════════════════════════════════════════════ */
const TRACK_LEN=10;
function initCheckpoints(){
  const cp=document.getElementById("checkpoints");
  if(!cp)return;
  cp.innerHTML=Array.from({length:TRACK_LEN},(_,i)=>`<div class="checkpoint" id="cp-${i}"></div>`).join("");
}
function updateCheckpoints(done){
  for(let i=0;i<TRACK_LEN;i++){
    const cp=document.getElementById(`cp-${i}`);
    if(!cp)continue;
    cp.classList.toggle("done",i<done);
    cp.classList.toggle("current",i===done);
  }
}

/* ════════════════════════════════════════════════
   RESULTADO FINAL
════════════════════════════════════════════════ */
function showRaceResult(answered, correct, time){
  const wrap=document.getElementById("kart-question-wrap");
  if(!wrap)return;
  wrap.innerHTML="";

  const acc=answered>0?Math.round((correct/answered)*100):0;
  const isRecord=appState.bestTime===null||time<appState.bestTime;
  if(isRecord) appState.bestTime=time;

  const div=document.createElement("div");
  div.className="race-result";
  div.innerHTML=`
    <div class="result-title">🏁 ¡META!</div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="result-stat-val">${correct}/${answered}</div>
        <div class="result-stat-label">Respuestas correctas</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-val">${acc}%</div>
        <div class="result-stat-label">Precisión</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-val">${String(Math.floor(time/60)).padStart(2,"0")}:${String(time%60).padStart(2,"0")}</div>
        <div class="result-stat-label">${isRecord?"⭐ Mejor tiempo":"Tiempo"}</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-val">+${appState.coins}</div>
        <div class="result-stat-label">Monedas totales</div>
      </div>
    </div>
    <button class="btn-play-again" id="btn-play-again" type="button">¡Correr de nuevo!</button>
  `;
  wrap.appendChild(div);
  document.getElementById("btn-play-again")?.addEventListener("click",()=>{
    sfxClick();
    // Limpiar controles táctiles
    const tb=document.getElementById("touch-buttons");
    if(tb) tb.innerHTML="";
    startKartMode();
  });

  // Limpiar botones táctiles
  const tb=document.getElementById("touch-buttons");
  if(tb) tb.innerHTML="";
}

/* ════════════════════════════════════════════════
   MODO CARRERA PRINCIPAL
════════════════════════════════════════════════ */
async function startKartMode(){
  const loadingEl=document.getElementById("race-loading");
  const speedBar=document.getElementById("speed-bar");
  const qWrap=document.getElementById("kart-question-wrap");
  if(qWrap) qWrap.innerHTML=`<p style="font-family:var(--f-mono);color:var(--c-txt-soft);font-size:12px;letter-spacing:2px;">CARGANDO…</p>`;

  if(threeHandle){ threeHandle.destroy(); threeHandle=null; }

  if(loadingEl) loadingEl.classList.remove("hidden");
  threeHandle=await initThreeJS("race-canvas");
  if(loadingEl) loadingEl.classList.add("hidden");

  initCheckpoints();
  startRaceTimer();

  let answered=0, correctCount=0;
  let adaptLvl=appState.adaptiveLevel??1;
  let raceHist=[...appState.history.slice(-6)];

  updateAdaptiveUI(adaptLvl, raceHist);

  function nextQ(){
    if(answered>=TRACK_LEN){
      // FIN
      stopRaceTimer();
      sfxVictory();
      appState.stars+=1;
      appState.coins+=Math.ceil(TRACK_LEN/2)+correctCount;
      appState.adaptiveLevel=adaptLvl;
      appState.history=[...appState.history,...raceHist].slice(-30);
      updateHud();
      syncProgress();
      updateCheckpoints(TRACK_LEN);
      showRaceResult(answered, correctCount, raceSeconds);
      say("bubble-app","¡Llegaste a la meta! Lo lograste 🎉");
      return;
    }

    const q=genQuestion(adaptLvl);
    renderQuestion("kart-question-wrap", q, (ok)=>{
      raceHist.push(ok);
      answered++;
      if(ok){ correctCount++; sfxEngine(); }

      // Progreso barra y checkpoints
      const pct=answered/TRACK_LEN;
      if(speedBar) speedBar.style.width=`${Math.min(100,pct*100)}%`;
      const pctEl=document.getElementById("race-pct");
      if(pctEl) pctEl.textContent=`${Math.round(pct*100)}%`;
      const qcEl=document.getElementById("race-q-count");
      if(qcEl) qcEl.textContent=`${answered}/${TRACK_LEN}`;
      updateCheckpoints(answered);
      if(threeHandle) threeHandle.advance(pct);

      // Nivel adaptativo
      const newLvl=computeNewLevel(adaptLvl,raceHist);
      if(newLvl!==adaptLvl){
        adaptLvl=newLvl;
        appState.adaptiveLevel=adaptLvl;
        const msg=newLvl>adaptLvl-1?"🔥 ¡Dificultad subió al nivel "+newLvl+"!":"💡 Dificultad bajada para ti.";
        showToast(msg);
        sfxLvlUp();
        syncProgress();
      }
      updateAdaptiveUI(adaptLvl,raceHist);

      if(ok) appState.coins++;
      updateHud();

      nextQ();
    });
  }
  nextQ();
}

/* ════════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════════ */
const viewWelcome=document.getElementById("view-welcome");
const viewApp=document.getElementById("view-app");

function toggleViews(authed){
  viewWelcome.hidden=authed;
  viewApp.hidden=!authed;
}
function updateHud(){
  const first=currentUser?.displayName?.split(" ")[0]??"Piloto";
  document.getElementById("hud-name").textContent=`${first} 👾`;
  document.getElementById("hud-coins").textContent=appState.coins;
  document.getElementById("hud-stars").textContent=appState.stars;
  document.getElementById("hud-level").textContent=appState.adaptiveLevel??1;
  const av=document.getElementById("hud-avatar");
  av.src=currentUser?.photoURL??A.ICON;
  av.alt=currentUser?.displayName??"Avatar";
}
async function syncProgress(){ await saveProgress(currentUser?.uid,appState); }

function showSection(id){
  document.querySelectorAll(".section-app").forEach(s=>{ s.hidden=s.id!==id; });
  document.querySelectorAll(".hud-nav button[id^='nav-']").forEach(b=>{
    b.classList.toggle("active",b.id===`nav-${id.replace("sec-","")}`);
  });
}

/* ════════════════════════════════════════════════
   EVENTOS UI
════════════════════════════════════════════════ */
// Login
document.getElementById("btn-login").addEventListener("click",async()=>{
  sfxClick();
  const btn=document.getElementById("btn-login");
  btn.disabled=true;
  try{
    await signInWithPopup(auth,provider);
  }catch(err){
    const msgs={
      "auth/popup-blocked":        "Tu navegador bloqueó el pop-up. Actívalo e intenta de nuevo.",
      "auth/popup-closed-by-user": "Cerraste la ventana. ¿Lo intentamos de nuevo?",
      "auth/network-request-failed":"Sin conexión. Revisa tu red.",
    };
    const msg=msgs[err.code]??"No pudimos iniciar sesión. ¿Probamos de nuevo?";
    if(msg) say("bubble-welcome",msg);
  }finally{
    btn.disabled=false;
  }
});

// Logout
document.getElementById("btn-logout").addEventListener("click",async()=>{
  sfxClick();
  if(threeHandle){ threeHandle.destroy(); threeHandle=null; }
  keyAnswerCb=null; gamepadAnswerCb=null;
  await signOut(auth);
});

// Nav home
document.getElementById("nav-home").addEventListener("click",()=>{
  sfxClick(); showSection("sec-home");
});

// Nav kart
document.getElementById("nav-kart").addEventListener("click",()=>{
  sfxClick(); showSection("sec-kart");
  const pilotWrap=document.getElementById("pilot-select");
  const kartGame=document.getElementById("kart-game");
  kartGame.hidden=true; pilotWrap.hidden=false;
  renderPilotSelect("pilot-select",async()=>{
    pilotWrap.hidden=true; kartGame.hidden=false;
    const sp=document.getElementById("speed-bar");
    const pct=document.getElementById("race-pct");
    const qc=document.getElementById("race-q-count");
    if(sp) sp.style.width="0%";
    if(pct) pct.textContent="0%";
    if(qc)  qc.textContent=`0/${TRACK_LEN}`;
    const tb=document.getElementById("touch-buttons");
    if(tb) tb.innerHTML="";
    await startKartMode();
  });
});

// Home card → kart
document.getElementById("home-go-kart")?.addEventListener("click",()=>{
  document.getElementById("nav-kart").click();
});

/* ════════════════════════════════════════════════
   AUTH STATE
════════════════════════════════════════════════ */
onAuthStateChanged(auth,async(user)=>{
  if(user){
    currentUser=user;
    appState=await loadProgress(user.uid);
    toggleViews(true);
    updateHud();
    renderMascot("mascot-app");
    say("bubble-app","¡Listo! Elige tu Kart y ¡a correr! 🏎️");
    showSection("sec-home");
  }else{
    currentUser=null;
    appState=freshState();
    keyAnswerCb=null; gamepadAnswerCb=null;
    toggleViews(false);
    renderMascot("mascot-welcome");
    say("bubble-welcome","Hola, soy Bolu. ¿Listo para correr? 🎮");
    buildStars();
  }
});

// Inicializar estrellas al cargar (antes de login)
buildStars();

</script>
