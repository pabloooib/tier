/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS — paleta pastel/mate retro arcade
════════════════════════════════════════════════════════════ */
:root {
  /* Paleta principal */
  --c-sky:       #5b7fa6;
  --c-terra:     #d98c7a;
  --c-sage:      #7fae8e;
  --c-mustard:   #e8c468;
  --c-cream:     #faf6ef;
  --c-cream-2:   #f1ece1;
  --c-txt:       #3a3a3a;
  --c-txt-soft:  #6b6b6b;
  --c-border:    #e3dcc9;
  --c-glass:     rgba(250,246,239,0.70);
  --c-glass-dk:  rgba(20,20,36,0.82);

  /* Tipografía */
  --f-game: "MarioKart", "Trebuchet MS", system-ui, sans-serif;
  --f-body: system-ui, -apple-system, sans-serif;
  --f-mono: "JetBrains Mono", "Courier New", monospace;

  /* Radios */
  --r-xs:   10px;
  --r-sm:   16px;
  --r-md:   24px;
  --r-lg:   32px;
  --r-pill: 999px;

  /* Sombras */
  --sh-float: 0 8px 32px rgba(58,58,58,0.12), 0 2px 8px rgba(58,58,58,0.06);
  --sh-soft:  0 4px 14px rgba(58,58,58,0.08);
  --sh-hud:   0 4px 28px rgba(58,58,58,0.14), 0 1px 4px rgba(58,58,58,0.08);
  --sh-btn:   0 6px 20px rgba(91,127,166,0.25);

  /* Animaciones */
  --dur:  300ms;
  --ease: cubic-bezier(0.22,1,0.36,1);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--c-cream);
  color: var(--c-txt);
  font-family: var(--f-body);
  line-height: 1.55;
  min-height: 100dvh;
  overflow-x: hidden;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
button:focus-visible, a:focus-visible {
  outline: 3px solid var(--c-sky);
  outline-offset: 3px;
  border-radius: var(--r-xs);
}

/* ═══════════════════════════════════════════════════════════
   PANTALLA BIENVENIDA
════════════════════════════════════════════════════════════ */
.welcome-screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,  rgba(91,127,166,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 85% 95%, rgba(217,140,122,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(232,196,104,0.12) 0%, transparent 55%),
    linear-gradient(175deg, var(--c-cream) 0%, var(--c-cream-2) 100%);
}

/* Burbujas decorativas de fondo */
.welcome-screen::before,
.welcome-screen::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.22;
  animation: drift 12s ease-in-out infinite alternate;
}
.welcome-screen::before {
  width: 420px; height: 420px;
  background: radial-gradient(circle, var(--c-mustard) 0%, transparent 70%);
  top: -130px; right: -100px;
  animation-delay: 0s;
}
.welcome-screen::after {
  width: 340px; height: 340px;
  background: radial-gradient(circle, var(--c-sky) 0%, transparent 70%);
  bottom: -80px; left: -90px;
  animation-delay: -5s;
}

@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(20px, 15px) scale(1.06); }
}

.welcome-card {
  background: var(--c-glass);
  border: 1.5px solid rgba(227,220,201,0.75);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-float);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 44px 40px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
  max-width: 400px;
  width: 100%;
  position: relative;
  z-index: 1;
}

.welcome-card h1 {
  font-family: var(--f-game);
  font-size: clamp(22px,5vw,34px);
  color: var(--c-sky);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 1px;
}
.welcome-card h1 em {
  font-style: normal;
  color: var(--c-terra);
}

.mascot-wrap { width: 108px; height: 108px; flex-shrink: 0; }
.mascot-img  { width: 100%; height: 100%; object-fit: contain; }

.speech-bubble {
  background: #fff;
  border: 1.5px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 9px 16px;
  font-size: 14px;
  color: var(--c-txt-soft);
  text-align: center;
  max-width: 260px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  position: relative;
}
.speech-bubble::after {
  content: "";
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-top: none;
  border-bottom-color: #fff;
}
.speech-bubble.visible { opacity: 1; transform: translateY(0); }

.btn-login {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: #fff;
  border: 2px solid var(--c-border);
  border-radius: var(--r-pill);
  padding: 14px 28px;
  font-size: 16px;
  font-weight: 700;
  font-family: var(--f-body);
  color: var(--c-txt);
  box-shadow: var(--sh-soft);
  width: 100%;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color 200ms;
}
.btn-login:hover {
  transform: translateY(-3px);
  box-shadow: var(--sh-float);
  border-color: var(--c-sky);
}
.btn-login:active  { transform: translateY(0); }
.btn-login:disabled { opacity: 0.6; pointer-events: none; }
.btn-login svg { width: 22px; height: 22px; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════════
   HUD — ISLA DINÁMICA FLOTANTE
════════════════════════════════════════════════════════════ */
.hud-shell {
  position: sticky;
  top: 10px;
  z-index: 200;
  padding: 0 14px;
  pointer-events: none;
}
.hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  padding: 9px 16px;
  background: var(--c-glass);
  border: 1.5px solid rgba(227,220,201,0.8);
  border-radius: var(--r-pill);
  box-shadow: var(--sh-hud);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  pointer-events: all;
  max-width: 700px;
  margin: 0 auto;
  transition: box-shadow 300ms;
}
.hud:hover { box-shadow: 0 8px 40px rgba(58,58,58,0.17); }

.hud-user  { display: flex; align-items: center; gap: 9px; }
.hud-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2.5px solid var(--c-sky); object-fit: cover; flex-shrink: 0;
}
.hud-name {
  font-family: var(--f-game);
  font-size: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 140px;
}

.hud-stats { display: flex; gap: 10px; }
.hud-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--c-cream-2);
  border: 1px solid var(--c-border);
  border-radius: var(--r-pill);
  padding: 4px 10px;
  font-family: var(--f-mono);
  font-size: 12px; font-weight: 700;
}
.coin-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--c-mustard); flex-shrink: 0;
}

.hud-nav { display: flex; gap: 5px; }
.hud-nav button {
  background: var(--c-cream-2);

.blocks-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(120px,1fr));
  gap: 12px;
  max-width: 300px;
  width: 100%;
}

.block-btn {
  position: relative;
  background: linear-gradient(145deg, #f5d77a, var(--c-mustard));
  border: none;
  border-radius: var(--r-md);
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  box-shadow:
    0 4px 16px rgba(232,196,104,0.32),
    0 2px 4px rgba(58,58,58,0.06),
    inset 0 1px 0 rgba(255,255,255,0.45);
  overflow: hidden;
  animation: blockFloat 2.6s ease-in-out infinite;
  transition: transform 200ms var(--ease), box-shadow 200ms var(--ease);
}
.block-btn:nth-child(2) { animation-delay:  0.2s; }
.block-btn:nth-child(3) { animation-delay:  0.4s; }
.block-btn:nth-child(4) { animation-delay:  0.6s; }

@keyframes blockFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

.block-btn:not(:disabled):hover {
  transform: translateY(-7px) scale(1.04);
  box-shadow: 0 12px 28px rgba(232,196,104,0.42), 0 4px 8px rgba(58,58,58,0.08);
  animation-play-state: paused;
}
.block-btn:not(:disabled):active { transform: scale(0.97); }
.block-btn:disabled { animation-play-state: paused; }

.block-sign {
  font-family: var(--f-game);
  font-size: 18px; font-weight: 700;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 1px 3px rgba(0,0,0,0.18);

.block-val {
  font-family: var(--f-mono);
  font-size: 22px; font-weight: 700;
  color: var(--c-txt);

  background: linear-gradient(145deg, #95c8a4, var(--c-sage)) !important;
  box-shadow: 0 4px 16px rgba(127,174,142,0.38), inset 0 1px 0 rgba(255,255,255,0.4) !important;
}
.block-btn.wrong {
  background: var(--c-cream-2) !important;
  box-shadow: none !important;
  opacity: 0.5;
}

.coin-burst {
  position: absolute; top: 50%; left: 50%;
  font-size: 16px; color: var(--c-mustard);
  pointer-events: none;
  animation: coinBurst 680ms ease-out forwards;
}
@keyframes coinBurst {
  0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
  60%  { transform: translate(-50%,-170%) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%,-220%) scale(0.8); opacity: 0; }

let audioCtx = null, muted = false;
const getCtx = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; };

function tone(freq, dur = 0.12, vol = 0.05, delay = 0) {
  if (muted) return;
  const ctx = getCtx(), t = ctx.currentTime + delay;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = "square"; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur);
}

/* ═══════════════════════════════════════════════════════════════════════
   7. SISTEMA ADAPTATIVO DE PREGUNTAS
════════════════════════════════════════════════════════════════════════ */
function genQuestion(adaptLevel = 1) {
  const range = { 1: 5, 2: 10, 3: 20 }[adaptLevel] ?? 5;
  const a = Math.floor(Math.random() * range) + 1;
  const b = Math.floor(Math.random() * range) + 1;
  const correct = a + b;
  const opts = new Set([correct]);
  while (opts.size < 4) {
    const d = correct + Math.floor(Math.random() * 5) - 2;
    if (d >= 0 && d !== correct) opts.add(d);
  }
  return { text: `¿Cuánto es ${a} + ${b}?`, options: shuffle([...opts]), correct };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function adaptLevel(current, hist) {
  const last3 = hist.slice(-3), last2 = hist.slice(-2);
  if (last3.length === 3 && last3.every(Boolean))          return Math.min(3, current + 1);
  if (last2.length === 2 && last2.every(v => v === false)) return Math.max(1, current - 1);
  return current;
}

function renderQuestion(containerId, q, onResult) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  wrap.innerHTML = "";

  const txt = document.createElement("p");
  txt.className = "question-text";
  txt.textContent = q.text;
  wrap.appendChild(txt);

  const grid = document.createElement("div");
  grid.className = "blocks-grid";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "block-btn";
    btn.type = "button";
    btn.setAttribute("aria-label", `Responder ${opt}`);
    btn.innerHTML = `<span class="block-sign">?</span><span class="block-val">${opt}</span>`;

    btn.addEventListener("click", () => {
      grid.querySelectorAll("button").forEach(b => b.disabled = true);
      const ok = opt === q.correct;
      btn.classList.add(ok ? "correct" : "wrong");
      if (ok) {
        const coin = document.createElement("span");
        coin.className = "coin-burst"; coin.textContent = "●";
        coin.setAttribute("aria-hidden","true");
        btn.appendChild(coin);
        coin.addEventListener("animationend", () => coin.remove());
        sfxCorrect();
      } else {
        sfxWrong();
      }
      setTimeout(() => onResult(ok), ok ? 700 : 500);
    });
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
}

   8. THREE.JS — MOTOR 3D DEL KART
      Carga: kart.glb + mario-circuit-test-transformed.glb
════════════════════════════════════════════════════════════════════════ */
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

let threeScene = null;

async function initThreeJS(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;

  // Renderer
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0e1428);
  scene.fog = new THREE.FogExp2(0x0e1428, 0.012);

  // Camera
  const aspect = canvas.clientWidth / canvas.clientHeight;
  const camera = new THREE.PerspectiveCamera(55, aspect, 0.1, 500);
  camera.position.set(0, 5, 14);
  camera.lookAt(0, 0, 0);

  // Controls (limitados para que se sienta cinematico)
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 5;
  controls.maxDistance = 40;
  controls.maxPolarAngle = Math.PI / 2.1;
  controls.enablePan = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.4;

  // Luces
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xffecd2, 2.2);
  sun.position.set(12, 20, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 100;
  sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
  sun.shadow.camera.top  =  30; sun.shadow.camera.bottom = -30;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x9bbfe8, 0.8);
  fill.position.set(-8, 8, -6);
  scene.add(fill);

  const rim = new THREE.PointLight(0xe8c468, 1.5, 40);
  rim.position.set(0, 8, -12);
  scene.add(rim);

  // Suelo reflectante de emergencia (por si el track tarda)
  const floorGeo  = new THREE.PlaneGeometry(120, 120);
  const floorMat  = new THREE.MeshStandardMaterial({
    color: 0x2a2a3a, roughness: 0.85, metalness: 0.1
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Partículas de ambiente (estrellas/polvo)
  const starGeo = new THREE.BufferGeometry();
  const starCount = 900;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 200;
  starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xfaf6ef, size: 0.18, sizeAttenuation: true });
  scene.add(new THREE.Points(starGeo, starMat));

  // Estado de carrera 3D
  const raceState3D = {
    kart: null,
    track: null,
    kartProgress: 0,       // 0-1
    targetProgress: 0,
    kartPath: [],
    engineTime: 0,
  };

  const loader = new GLTFLoader();

  // Carga del circuito
  const trackPromise = new Promise((resolve, reject) => {
    loader.load(
      A.TRACK_GLB,
      (gltf) => {
        const track = gltf.scene;
        track.scale.set(0.8, 0.8, 0.8);
        track.position.set(0, 0, 0);
        track.traverse(c => {
          if (c.isMesh) {
            c.receiveShadow = true;
            c.castShadow = false;
          }
        });
        scene.add(track);
        raceState3D.track = track;
        resolve(track);
      },
      undefined,
      reject
    );
  });

  // Carga del kart
  const kartPromise = new Promise((resolve, reject) => {
    loader.load(
      A.KART_GLB,
      (gltf) => {
        const kart = gltf.scene;
        kart.scale.set(0.5, 0.5, 0.5);
        kart.position.set(0, 0.3, 0);
        kart.traverse(c => {
          if (c.isMesh) {
            c.castShadow = true;
            c.receiveShadow = true;
          }
        });
        scene.add(kart);
        raceState3D.kart = kart;
        resolve(kart);
      },
      undefined,
      reject
    );
  });

  // Esperar ambos modelos
  try {
    await Promise.all([trackPromise, kartPromise]);
    console.log("[Tier 3D] Modelos cargados correctamente.");
  } catch (err) {
    console.warn("[Tier 3D] Fallo cargando modelos, usando fallback Canvas 2D:", err);
  }

  // Generar un camino circular simple de la pista para animar el kart
  const pathRadius = 8;
  const pathPoints = 120;
  raceState3D.kartPath = Array.from({ length: pathPoints }, (_, i) => {
    const angle = (i / pathPoints) * Math.PI * 2;
    return new THREE.Vector3(
      Math.cos(angle) * pathRadius,
      0.35,
      Math.sin(angle) * pathRadius
    );
  });

  // Bucle de renderizado
  let animId = null;
  function animate() {
    animId = requestAnimationFrame(animate);
    const delta = 0.016;

    // Suavizar movimiento del kart
    if (raceState3D.kart && raceState3D.kartPath.length > 0) {
      raceState3D.kartProgress += (raceState3D.targetProgress - raceState3D.kartProgress) * 0.04;
      const idx = Math.floor(raceState3D.kartProgress * raceState3D.kartPath.length) % raceState3D.kartPath.length;
      const next = (idx + 1) % raceState3D.kartPath.length;
      const pos  = raceState3D.kartPath[idx];
      const look = raceState3D.kartPath[next];
      raceState3D.kart.position.lerp(pos, 0.12);
      raceState3D.kart.lookAt(look);
      // Leve cabeceo del kart
      raceState3D.kart.rotation.z = Math.sin(Date.now() * 0.003) * 0.04;
    }

    // Rim light pulsante
    rim.intensity = 1.3 + Math.sin(Date.now() * 0.002) * 0.3;

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // Responsive
  const ro = new ResizeObserver(() => {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });
  ro.observe(canvas);

  return {
    advance(progress01) {
      raceState3D.targetProgress = progress01;
    },
    destroy() {
      if (animId) cancelAnimationFrame(animId);
      ro.disconnect();
      renderer.dispose();
    }
  };
}

/* ═══════════════════════════════════════════════════════════════════════
   9. PILOTO — selección
════════════════════════════════════════════════════════════════════════ */
const PILOTS = [
  { id: "red",   name: "Rojo",  color: "#D98C7A" },
  { id: "blue",  name: "Azul",  color: "#5B7FA6" },
  { id: "green", name: "Verde", color: "#7FAE8E" },
];

let chosenPilot = PILOTS[0];

function renderPilotSelect(containerId, onChoose) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  wrap.innerHTML = `<h3 class="section-title">Elige tu vehículo</h3>`;
  const grid = document.createElement("div");
  grid.className = "pilots-grid";

  PILOTS.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "pilot-card";
    btn.type = "button";
    btn.setAttribute("aria-label", `Elegir ${p.name}`);
    btn.style.setProperty("--color-p", p.color);
    btn.innerHTML = `
      <div class="pilot-swatch" style="background:${p.color}"></div>
      <span class="pilot-name">${p.name}</span>`;
    btn.addEventListener("click", () => {
      chosenPilot = p;
      sfxClick();
      onChoose(p.id);
    });
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
}

/* ═══════════════════════════════════════════════════════════════════════
   10. TOAST DE NIVEL
════════════════════════════════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById("level-toast");
  if (!t) return;
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

/* ═══════════════════════════════════════════════════════════════════════
   11. CARRERA 3D — orquestador del minijuego
════════════════════════════════════════════════════════════════════════ */
const TRACK_LEN  = 10;   // preguntas para completar el circuito
let   raceEngine = null;

async function startKartMode() {
  const loading  = document.getElementById("race-loading");
  const speedBar = document.getElementById("speed-bar");

  if (raceEngine) { raceEngine.destroy(); raceEngine = null; }
  raceEngine = await initThreeJS("race-canvas");
  if (loading) loading.classList.add("hidden");

  let answered  = 0;
  let adaptLvl  = appState.adaptiveLevel ?? 1;
  let raceHist  = [];

  function nextQuestion() {
    const q = genQuestion(adaptLvl);
    renderQuestion("kart-question-wrap", q, (ok) => {
      raceHist.push(ok);
      answered++;
      const newLvl = adaptLevel(adaptLvl, raceHist);
      if (newLvl !== adaptLvl) {
        adaptLvl = newLvl;
        appState.adaptiveLevel = adaptLvl;
        const msg = newLvl > adaptLvl - 1
          ? "🔥 ¡Nivel de dificultad subió!"
          : "💡 Dificultad ajustada para ti.";
        showToast(msg);
        syncProgress();
      }

      if (ok) {
        appState.coins += 1;
        updateHud();
        if (raceEngine) raceEngine.advance(answered / TRACK_LEN);
        if (speedBar) speedBar.style.width = `${Math.min(100, (answered / TRACK_LEN) * 100)}%`;
        sfxEngine();
      }

      if (answered >= TRACK_LEN) {
        sfxVictory();
        appState.stars += 1;
        appState.coins += 5;
        appState.adaptiveLevel = adaptLvl;
        updateHud();
        syncProgress();
        document.getElementById("kart-question-wrap").innerHTML =
          `<p class="question-text">🏁 ¡Meta alcanzada! +5 monedas ⭐</p>`;
        say("bubble-app", "¡Llegaste a la meta! Lo hiciste increíble. 🎉");
        return;
      }
      nextQuestion();
    });
  }

  nextQuestion();
}

/* ═══════════════════════════════════════════════════════════════════════
   12. APP — estado global y orquestador principal
════════════════════════════════════════════════════════════════════════ */
let currentUser = null;
let appState    = freshState();

const viewWelcome = document.getElementById("view-welcome");
const viewApp     = document.getElementById("view-app");

function toggleViews(authed) {
  viewWelcome.hidden = authed;
  viewApp.hidden     = !authed;
}

function updateHud() {
  const firstName = currentUser?.displayName?.split(" ")[0] ?? "Tier";
  document.getElementById("hud-name").textContent  = `¡Hola, ${firstName}! 👋`;
  document.getElementById("hud-coins").textContent = appState.coins;
  document.getElementById("hud-stars").textContent = appState.stars;
  const av = document.getElementById("hud-avatar");
  av.src = currentUser?.photoURL ?? A.ICON;
  av.alt = currentUser?.displayName ?? "Avatar";
}

async function syncProgress() {
  await saveProgress(currentUser?.uid, appState);
}

function showSection(id) {
  document.querySelectorAll(".section-app").forEach(s => { s.hidden = s.id !== id; });
  document.querySelectorAll(".hud-nav button[id^='nav-']").forEach(b => {
    b.classList.toggle("active", b.id === `nav-${id.replace("sec-", "")}`);
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   13. EVENTOS DE UI
════════════════════════════════════════════════════════════════════════ */

// LOGIN — async/await con try/catch por código de error
document.getElementById("btn-login").addEventListener("click", async () => {
  sfxClick();
  const btn = document.getElementById("btn-login");
  btn.disabled = true;
  try {
    await loginGoogle();
    // onAuthStateChanged manejará el resto
  } catch (err) {
    console.error("[Tier] Login fallido:", err.code, err.message);
    const msgs = {
      "auth/popup-blocked":               "Tu navegador bloqueó el pop-up. Actívalo e inténtalo de nuevo.",
      "auth/popup-closed-by-user":        "Cerraste la ventana de inicio de sesión. ¿Lo intentamos de nuevo?",
      "auth/cancelled-popup-request":     "",  // silencioso
      "auth/network-request-failed":      "Sin conexión. Revisa tu red y vuelve a intentarlo.",
    };
    const msg = msgs[err.code] ?? "No pudimos iniciar sesión. ¿Probamos otra vez?";
    if (msg) say("bubble-welcome", msg);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById("btn-logout").addEventListener("click", async () => {
  sfxClick();
  if (raceEngine) { raceEngine.destroy(); raceEngine = null; }
  await logoutApp();
});

document.getElementById("nav-home").addEventListener("click", () => {
  sfxClick();
  showSection("sec-home");
});

document.getElementById("nav-kart").addEventListener("click", () => {
  sfxClick();
  showSection("sec-kart");

  const pilotWrap = document.getElementById("pilot-select");
  const kartGame  = document.getElementById("kart-game");
  kartGame.hidden  = true;
  pilotWrap.hidden = false;

  renderPilotSelect("pilot-select", async () => {
    pilotWrap.hidden = true;
    kartGame.hidden  = false;
    document.getElementById("kart-question-wrap").innerHTML = "";
    document.getElementById("race-loading").classList.remove("hidden");
    if (document.getElementById("speed-bar"))
      document.getElementById("speed-bar").style.width = "0%";
    await startKartMode();
  });
});

/* ═══════════════════════════════════════════════════════════════════════
   14. AUTH STATE OBSERVER
════════════════════════════════════════════════════════════════════════ */
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    appState    = await loadProgress(user.uid);
    toggleViews(true);
    updateHud();
    renderMascot("mascot-app");
    say("bubble-app", "¡Todo listo! Escoge Kart para la aventura. 🏎️");
    showSection("sec-home");
  } else {
    currentUser = null;
    appState    = freshState();
    toggleViews(false);
    renderMascot("mascot-welcome");
    say("bubble-welcome", "Hola, soy Bolu. ¿Listo para correr? 🎮");
  }
});
</script>
